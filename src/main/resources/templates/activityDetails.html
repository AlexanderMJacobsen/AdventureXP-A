<!DOCTYPE html>
<html lang="dk" xmlns:th="https://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title th:text="${activity.title}"></title>
    <link rel="stylesheet" th:href="@{/css/style-activity-details.css}">
</head>
<body>
<header th:replace="~{fragments/header :: header-element}"></header>

<div class="page-wrapper">
    <!-- Top section -->
    <div class="top-section">
        <div class="top-left">
            <img th:src="@{/img/win.png}" alt="winning" style="width: 100px; height: 125px;" />
        </div>
        <div class="top-right">
            <div class="activity-info">
                <h2 th:text="${activity.title}">Aktivitet</h2>
                <p th:text="${activity.description}">Beskrivelse ikke tilgængelig.</p>
            </div>
            <div class="activity-info">
                <h2>Krav</h2>
                <!--<p th:text="${activity.requirements} ?: 'Ingen krav fundet'"></p> -->
            </div>
        </div>
    </div>

    <!-- Bottom section -->
    <div class="bottom-section">
        <div class="bottom-left">
            <div class="udstyr-header">
                <h2>Udstyr</h2>
                <button class="rediger-btn">Rediger</button>
            </div>
            <ul>
                <li th:each="equipment : ${equipment}" th:text="${equipment.name}"></li>
            </ul>
        </div>
        <div class="bottom-right">
            <table>
                <tr>
                    <th>Udstyr</th>
                    <th>Status</th>
                </tr>
                <tr th:each="equipment : ${equipment}">
                    <td th:text="${equipment.name}"></td>
                    <td th:text="${equipment.status}"></td>
                </tr>
            </table>
        </div>
    </div>
</div>
</body>
</html>
